<!DOCTYPE html>
<html>
<body style="margin:0;font-family:Arial;text-align:center;">
<div id="pt-time" style="font-size:18px;padding:10px;"></div>

<script>
function updatePTTime() {
  const now = new Date();
  const timeString = now.toLocaleTimeString("en-US", {
    timeZone: "America/Los_Angeles",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: true
  });

  document.getElementById("pt-time").textContent = "Current Time: " + timeString + " PT";
}

updatePTTime();
setInterval(updatePTTime, 1000);
</script>
</body>
</html>

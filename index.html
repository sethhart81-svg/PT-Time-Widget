<!DOCTYPE html>
<html>
<body style="margin:0;font-family:Arial;text-align:left;">
<div id="et-time" style="font-size:18px;padding:10px;"></div>

<script>
function updateETTime() {
  const now = new Date();
  const timeString = now.toLocaleTimeString("en-US", {
    timeZone: "America/New_York",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: true
  });

  document.getElementById("et-time").textContent = "Current Time: " + timeString + " ET";
}

updateETTime();
setInterval(updateETTime, 1000);
</script>
</body>
</html>
